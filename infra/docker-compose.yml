services:
  db:
    image: postgres:16-alpine
    container_name: color-assistant-db
    environment:
      POSTGRES_DB: color_assistant
      POSTGRES_USER: color_user
      POSTGRES_PASSWORD: color_pass
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U color_user -d color_assistant']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: