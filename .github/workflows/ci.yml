name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend lint
        run: pnpm lint:frontend
      - name: Frontend typecheck
        run: pnpm typecheck:frontend
      - name: Frontend test
        run: pnpm test:frontend

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: color_assistant
          POSTGRES_USER: color_user
          POSTGRES_PASSWORD: color_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U color_user -d color_assistant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://color_user:color_pass@localhost:5432/color_assistant
      JWT_SECRET_KEY: test-secret
      BACKEND_CORS_ALLOW_ORIGINS: '*'
      LOW_CONFIDENCE_THRESHOLD: '0.55'
      MAX_UPLOAD_SIZE_BYTES: '5242880'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync backend dependencies
        run: uv sync --project backend --dev
      - name: Wait for DB
        run: uv run --project backend python backend/scripts/wait_for_db.py
      - name: Apply migrations
        run: uv run --project backend alembic -c backend/alembic.ini upgrade head
      - name: Backend lint
        run: uv run --project backend ruff check backend/app backend/scripts backend/tests
      - name: Backend typecheck
        run: uv run --project backend mypy --config-file backend/pyproject.toml backend/app
      - name: Backend tests
        run: uv run --project backend pytest backend/tests

  contract:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      DATABASE_URL: postgresql+asyncpg://color_user:color_pass@localhost:5432/color_assistant
      JWT_SECRET_KEY: test-secret
      BACKEND_CORS_ALLOW_ORIGINS: '*'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync backend dependencies
        run: uv sync --project backend --dev
      - name: Export OpenAPI
        run: uv run --project backend python backend/scripts/export_openapi.py
      - name: Generate API client
        run: pnpm --filter @color-assistant/api-client run generate
      - name: Ensure no contract drift
        run: git diff --exit-code -- backend/openapi.json packages/api-client/src/generated
